name: Merge develop to sub branches

on:
  push:
    branches:
      - develop
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  open-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "Auto PR Bot"
          git config user.email "bot@example.com"

      - name: Authenticate gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          gh auth status

      - name: Fetch all branches
        run: git fetch --all --prune

      - name: Create PRs from develop into target branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Collect remote branches that match your patterns
          mapfile -t TARGETS < <(git branch -r \
            | sed 's|origin/||' \
            | grep -E '^(feature/|qa/|fix/|content-(art|audio|narrative|qa)$)')

          echo "Found target branches:"
          printf ' - %s\n' "${TARGETS[@]}"

          # Ensure we have latest develop
          git checkout develop
          git reset --hard origin/develop

          for branch in "${TARGETS[@]}"; do
            # Skip if it's literally 'develop' or 'main'
            if [[ "$branch" == "develop" || "$branch" == "main" ]]; then
              continue
            fi

            # Create a temp update branch from the target branch tip
            safe_branch="${branch//\//-}"                # replace slashes for a valid branch name
            update_branch="auto/develop-into-${safe_branch}"

            echo "🔧 Preparing PR for: develop → $branch"
            git checkout -B "$update_branch" "origin/$branch"

            # Merge develop into the update branch
            if ! git merge --no-edit origin/develop; then
              echo "⚠️ Merge conflict for $branch. Aborting and skipping."
              git merge --abort || true
              continue
            fi

            # If nothing changed, skip PR creation
            if git diff --quiet "origin/$branch"...HEAD; then
              echo "✅ $branch is already up to date with develop. Skipping PR."
              continue
            fi

            # Push update branch
            git push -u origin "$update_branch"

            # Create or update PR with gh
            title="chore: merge develop into ${branch}"
            body=$'Automated PR to bring **develop** into **'"$branch"$'**.\n\n'\
                 $'- Auto-generated by workflow.\n'\
                 $'- If conflicts arise, resolve in this PR.\n'

            # Check if PR already exists (open) from update_branch → branch
            if gh pr list --state open --head "$update_branch" --base "$branch" --json number --jq '.[0].number' >/dev/null 2>&1; then
              echo "🔁 PR already open for $branch — leaving as-is."
            else
              gh pr create \
                --head "$update_branch" \
                --base "$branch" \
                --title "$title" \
                --body "$body" || {
                  echo "⚠️ Failed to create PR for $branch."
                }
            fi
          done
