name: Merge develop into sub-branches

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autoupdate-develop
  cancel-in-progress: true

jobs:
  open-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "Auto PR Bot"
          git config user.email "bot@example.com"

      - name: Auth GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          gh auth status

      - name: Fetch all branches
        run: git fetch --all --prune

      - name: Collect targets
        id: targets
        run: |
          # List remote branches (short), strip origin/
          ALL=$(git branch -r --format='%(refname:short)' | sed 's|^origin/||')

          # Keep only: feature/*, fix/*, content-(art|audio|narrative|qa)/* 
          # Exclude: main, develop, staging, release/*
          TARGETS=$(echo "$ALL" \
            | grep -E '^(feature/|fix/|content-(art|audio|narrative|qa)/)' \
            | grep -Ev '^(main|develop|staging)$' \
            | grep -Ev '^release/')

          echo "Targets:"
          echo "$TARGETS" | sed 's/^/ - /'

          # Export as newline-separated for the next step
          printf "list<<EOF\n%s\nEOF\n" "$TARGETS" >> "$GITHUB_OUTPUT"

      - name: Create/Update PRs from develop
        if: steps.targets.outputs.list != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Auto-merge status (develop → sub-branches)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | Result | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------:|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"

          # Ensure latest develop
          git checkout develop
          git reset --hard origin/develop

          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            # Safety skip (double-check)
            if [[ "$branch" == "develop" || "$branch" == "main" || "$branch" == "staging" || "$branch" =~ ^release/ ]]; then
              continue
            fi

            safe_branch="${branch//\//-}"
            update_branch="auto/develop-into-${safe_branch}"

            echo "🔧 Preparing PR: develop → $branch"

            # Start from target tip
            git checkout -B "$update_branch" "origin/$branch"

            # Try to merge develop
            if ! git merge --no-edit origin/develop; then
              echo "⚠️ Merge conflict for $branch"
              git merge --abort || true
              echo "| $branch | ⚠️ Conflict | Resolve manually in a PR |" >> "$GITHUB_STEP_SUMMARY"
              # Open a PR that shows the conflict, based off target + develop as compare
              git checkout -B "$update_branch" "origin/$branch"
              # Use a merge commit to show conflicts in the PR diff (no push since merge aborted)
              # Create a PR that asks maintainers to pull develop into the branch manually
              title="chore: (manual) merge develop into ${branch}"
              body=$'Automated attempt to merge **develop** into **'"$branch"$'** resulted in conflicts.\n\nPlease resolve manually.'
              # Only create PR if not already open
              existing=$(gh pr list --state open --head "$update_branch" --base "$branch" --json number --jq '.[0].number' || true)
              if [ -z "$existing" ]; then
                # Push the branch so the PR can be opened (it's identical to target tip)
                git push -u origin "$update_branch" || true
                gh pr create --head "$update_branch" --base "$branch" --title "$title" --body "$body" || true
              fi
              continue
            fi

            # If nothing changed, skip PR
            if git diff --quiet "origin/$branch"...HEAD; then
              echo "✅ $branch already up to date"
              echo "| $branch | ✅ Up-to-date | No PR needed |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Push update branch and open/update PR
            git push -u origin "$update_branch"

            title="chore: merge develop into ${branch}"
            body=$'Automated PR to bring **develop** into **'"$branch"$'**.\n- Auto-generated by workflow\n- Conflicts already resolved (fast-forward or merge)\n'

            existing=$(gh pr list --state open --head "$update_branch" --base "$branch" --json number --jq '.[0].number' || true)
            if [ -n "$existing" ]; then
              echo "🔁 PR already open (#$existing) for $branch"
              echo "| $branch | 🔁 PR open | #$existing |" >> "$GITHUB_STEP_SUMMARY"
            else
              number=$(gh pr create --head "$update_branch" --base "$branch" --title "$title" --body "$body" --json number --jq '.number')
              echo "📬 Opened PR #$number for $branch"
              echo "| $branch | 📬 PR opened | #$number |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done <<< "${{ steps.targets.outputs.list }}"
